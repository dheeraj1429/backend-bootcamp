worker_processes auto;

events {
	worker_connections 1024;
}

http {
	log_format access_log_formate '$remote_addr $remote_user [$time_local] $request $status';

	access_log /var/log/nginx/nginx_log.log access_log_formate;
	error_log /var/log/nginx/nginx_error.log warn;

	map $http_host $user_host {
		hostnames;

		default 0;
		example.com	1;
		localhost	2;
	}

	server {
		listen 80;
		server_name localhost;

		location / {
			return 200 "Hello from the nginx!";
		}

		location /private {
			if ($user_host = 1) {
				return 401 "Unauthorized";
			}

			return 200 "Access";
		}

		location /update {
			return 201 "Demo response";
		}
	}
}
