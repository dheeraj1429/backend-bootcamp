apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx
      
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          imagePullPolicy: Always
          # resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

          ports:
            - containerPort: 80

      restartPolicy: Always