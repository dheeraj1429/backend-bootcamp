apiVersion: v1
kind: Secret
metadata:
  name: seq-secret
data:
  SEQ_PASSWORD: c2VxX3Bhc3N3b3Jk

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seq-config-map
data:
  ACCEPT_EULA: "y"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: seq

  template:
      metadata:
        labels:
          app: seq
      spec:
        containers:
          - name: seq-container
            image: datalust/seq:latest
            env:
              - name: ACCEPT_EULA
                valueFrom:
                  configMapKeyRef:
                    name: seq-config-map
                    key: ACCEPT_EULA
              - name: SEQ_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: seq-secret
                    key: SEQ_PASSWORD
            resources:
              requests:
                memory: "64Mi"
                cpu: "250m"
              limits: 
                memory: "120Mi"
                cpu: "500m"
            ports:
              - containerPort: 80
                name: ui
              - containerPort: 5341
                name: ingest

---
apiVersion: v1
kind: Service
metadata:
  name: seq-service
spec:
  selector:
    app: seq
  ports:
  - name: ui
    port: 80
    targetPort: 80
  - name: ingest
    port: 5341
    targetPort: 5341
  type: LoadBalancer