# This directive tells Nginx how many worker processes to start.
# Worker processes are responsible for handling requests.
# Setting it to auto allows Nginx to automatically determine the optimal number based on your CPU cores.
worker_processes auto;

# The events block sets the connection handling settings.
events {
    # worker_connections 1024; means that each worker process can handle 1024 simultaneous connections.
    # If you have 4 worker processes, you can handle 4096 connections concurrently.
    worker_connections 1024;
}

# The http block is where you define settings for handling HTTP requests.
# This is where most of your web server's configuration will reside.
http {
    include mime.types;

    # If Nginx can’t determine the MIME type of a file, it will use application/octet-stream as a fallback,
    # which generally means "download this file."
    # default_type application/octet-stream;

    # This setting determines how long a connection should stay open (in seconds) when it’s idle,
    # before Nginx closes it. The default is 65 seconds.
    keepalive_timeout 60;

    # The server block defines the configuration for a virtual server, i.e., a server that will handle requests for a particular domain or IP address.
    server {
        # This tells Nginx to listen for HTTP requests on port 80. Port 80 is the default port for HTTP.
        listen 80;

        # The server_name directive specifies the domain name that this server block will respond to.
        # localhost is typically used for local testing,
        # but in a real-world scenario, you'd replace it with your domain name (e.g., example.com).
        server_name localhost;

        # The location block is used to define how to respond to different request URIs.
        # The / means that this block will handle requests to the root URL (e.g., http://localhost/).
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm 404;
        }

        location /assets/ {
            # if user trying to access the http://localhost/assets/image.png the full path which created by nginx is
            # /var/www/assets/assets/image.png but the file which i want to access is /var/www/assets/image.png

            # The root directive appends the entire location path to the folder path you provided.

            # root /var/www/assets/;
            # root /var/www/;
            #     # In Nginx, the alias directive is used to map a specific URL path to a completely different folder on your hard drive.
            #     # It essentially allows you to fake your website's file structure.
            # You can make a folder located deep inside your system look like it’s right at the root of your website.
            #
            # Serving files from outside the web root: Like your previous example,
            # where you wanted files in /usr/share/nginx/html/about/ to be served when someone visits /basic.
            #
            # Managing user uploads: If your website lets users upload files to a central storage folder (e.g., /var/data/uploads/), you can use alias to make them accessible via example.com/downloads/.
            #
            # Separate Frontend/Backend assets: If you have a legacy system where specific admin tools or static assets live in isolated directories on the server, alias bridges the gap without moving the actual folders.
            alias /var/www/assets/;
        }


        # In short: index defines what file to look for if a user requests a folder, while try_files defines the backup plan if the requested file or folder doesn't exist.
        location /basic {
            alias /usr/share/nginx/html/about;
            # index index.html 404;
            index basic.html 404;
        }

        location /basic2 {
            alias /usr/share/nginx/html/about;

            try_files basic.html 404;
        }

        # location /basic {
        #     root /usr/share/nginx/html/about;
        #     index basic.html index.html 404;
        # }
        location /api {
            return 200 "Hello from the nginx";
        }
    }
}