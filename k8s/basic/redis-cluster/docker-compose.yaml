version: "3.8"

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - 7001:6379
      - 17001:16379
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data-1:/data
    command: redis-server /usr/local/etc/redis/redis.conf --port 6379
    networks:
      redis-cluster:
        ipv4_address: 173.30.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 30s
  
