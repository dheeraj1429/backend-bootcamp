worker_processes auto;

events {
    worker_connections 1024;
}

http {

    log_format access_log_formate '$remote_addr $remote_user [$time_local] $request $status';
    access_log /var/log/nginx/nginx_access.log access_log_formate;
    error_log /var/log/nginx/nginx_error.log warn;

    server {

        listen 80;
        server_name localhost;

        location / {
            return 200 "Hello from the nginx server!";
        }
    }
}