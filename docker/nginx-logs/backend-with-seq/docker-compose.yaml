version: "3.8"

services:
  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=y
      - SEQ_PASSWORD=seq_password

  api:
    build:
      context: ./server-logs
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SEQ_SERVER_URL=http://seq:5341
      - SEQ_API_KEY=K7iUhZ9OSp6oX5EOCfPt
    volumes:
      - ./server-logs:/usr/src/app
    depends_on:
      seq:
        condition: service_started

volumes:
  seq_data: